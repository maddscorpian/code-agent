<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local AI Agent Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        --font-mono: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
        --bg: #0f172a;
        --surface: #111827;
        --surface2: #1a2233;
        --border: #2a3a52;
        --border2: #1e2d42;
        --text: #d4dce8;
        --text-dim: #7a8fa8;
        --text-muted: #4e6179;
        --accent: #4d8ef0;
        --accent2: #3d7de0;
      }
      * { box-sizing: border-box; }
      body { font-family: var(--font-sans); margin: 0; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
      h1 { font-size: 19px; margin: 0 0 3px; font-weight: 500; letter-spacing: -0.3px; }
      .sub { color: var(--text-dim); margin-bottom: 14px; font-size: 13px; }
      .panel { border: 1px solid var(--border); border-radius: 12px; background: var(--surface); overflow: hidden; }
      .toolbar { padding: 9px 12px; border-bottom: 1px solid var(--border2); display: flex; gap: 8px; align-items: center; background: #0d1625; }
      .messages { height: 60vh; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
      .msg { padding: 12px 16px; border-radius: 10px; line-height: 1.65; max-width: 100%; word-break: break-word; }
      .user { background: #1a3a6b; color: #ccd9ec; align-self: flex-end; max-width: 80%; white-space: pre-wrap; font-size: 14px; }
      .ai {
        background: var(--surface2);
        border: 1px solid var(--border2);
        align-self: flex-start;
        width: 100%;
        color: var(--text);
        position: relative;
      }
      .copy-response-btn {
        position: absolute; top: 8px; right: 8px;
        font-family: var(--font-sans); font-size: 11px; padding: 3px 9px;
        border-radius: 5px; border: 1px solid var(--border);
        background: var(--surface); color: var(--text-muted);
        cursor: pointer; opacity: 0; transition: opacity 0.15s;
        white-space: nowrap;
      }
      .ai:hover .copy-response-btn { opacity: 1; }
      .copy-response-btn:hover { color: var(--text); border-color: #3a5070; }
      .copy-response-btn.copied { color: #5abf80; border-color: #2a5040; opacity: 1; }

      /* Plan strip */
      .plan-strip {
        font-size: 11px; color: var(--text-muted); margin-bottom: 10px;
        padding: 5px 10px; background: #0d1625; border-radius: 5px;
        border-left: 2px solid #2a3a52;
      }
      .plan-strip .tool-tag {
        display: inline-block; background: #152030; border: 1px solid var(--border2);
        border-radius: 3px; padding: 0 5px; margin: 1px 2px; color: var(--accent);
        font-size: 11px;
      }
      .thinking { color: var(--text-muted); font-style: italic; font-size: 13px; }

      /* ── AI response typography ───────────────────────────────── */
      .ai p { margin: 0 0 9px; }
      .ai p:last-child { margin-bottom: 0; }

      /* Headings — lighter weight, readable hierarchy */
      .ai h1, .ai h2, .ai h3, .ai h4 {
        font-family: var(--font-sans);
        font-weight: 500;
        color: #b8c8de;
        margin: 16px 0 5px;
        letter-spacing: -0.2px;
      }
      .ai h1 { font-size: 17px; border-bottom: 1px solid var(--border2); padding-bottom: 5px; margin-top: 4px; }
      .ai h2 { font-size: 15px; }
      .ai h3 { font-size: 14px; color: #a0b4cc; }
      .ai h4 { font-size: 13px; color: #8099b4; }

      /* Lists */
      .ai ul, .ai ol { margin: 4px 0 10px 18px; padding: 0; }
      .ai li { margin: 3px 0; color: var(--text); }
      .ai li::marker { color: var(--text-muted); }

      /* Inline code */
      .ai code {
        font-family: var(--font-mono);
        font-size: 12.5px;
        background: #0d1a2a;
        border: 1px solid var(--border2);
        border-radius: 4px;
        padding: 1px 5px;
        color: #7db3e0;
      }

      /* Code blocks */
      .ai pre {
        background: #0a1220;
        border: none;
        border-radius: 0 0 7px 7px;
        padding: 13px;
        overflow-x: auto;
        margin: 0;
      }
      .ai pre code {
        background: none; border: none; padding: 0;
        color: inherit; font-size: 12.5px;
      }
      .code-block-wrap {
        border: 1px solid #1e3050;
        border-radius: 7px;
        overflow: hidden;
        margin: 10px 0;
      }
      .code-toolbar {
        display: flex; align-items: center; gap: 6px;
        padding: 5px 10px;
        background: #0d1a2a;
        border-bottom: 1px solid #1e3050;
        min-height: 28px;
      }
      .code-file-path {
        flex: 1; font-size: 11px; color: var(--accent);
        font-family: var(--font-mono);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .code-action-btn {
        font-family: var(--font-sans); font-size: 11px;
        padding: 2px 8px; border-radius: 4px;
        border: 1px solid var(--border); background: var(--surface2);
        color: #a0b8d0; cursor: pointer; flex-shrink: 0;
      }
      .code-action-btn:hover { background: #1e2e42; }
      .code-action-btn.apply-btn { border-color: #1e40af; color: #6aaaf0; }
      .code-action-btn.apply-btn:hover { background: #1a2e50; }
      .code-action-btn.applied { color: #5abf80; border-color: #1e4a30; }
      .code-action-btn.failed  { color: #e07070; border-color: #5a1a1a; }

      /* Blockquote */
      .ai blockquote {
        border-left: 2px solid var(--border); margin: 8px 0;
        padding: 3px 12px; color: var(--text-dim);
      }

      /* Tables — clean, Mac-like */
      .ai table {
        border-collapse: collapse; width: 100%;
        margin: 10px 0; font-size: 13px;
        border: 1px solid var(--border2); border-radius: 6px;
        overflow: hidden;
      }
      .ai th {
        background: #0d1a2a; color: #8099b4;
        padding: 7px 12px; text-align: left;
        font-weight: 500; font-size: 12px;
        border-bottom: 1px solid var(--border2);
        border-right: 1px solid var(--border2);
      }
      .ai td {
        padding: 6px 12px; border-right: 1px solid var(--border2);
        border-bottom: 1px solid #182030; color: var(--text);
      }
      .ai tr:last-child td { border-bottom: none; }
      .ai th:last-child, .ai td:last-child { border-right: none; }
      .ai tr:nth-child(even) td { background: #131d2b; }

      /* Strong / em — no heavy white */
      .ai strong { font-weight: 500; color: #c0cfde; }
      .ai em { font-style: italic; color: var(--text-dim); }
      .ai a { color: var(--accent); text-decoration: none; }
      .ai a:hover { text-decoration: underline; }
      .ai hr { border: none; border-top: 1px solid var(--border2); margin: 12px 0; }

      /* Controls */
      .controls { padding: 10px; border-top: 1px solid var(--border2); display: grid; gap: 8px; background: #0d1625; }
      textarea {
        width: 100%; min-height: 90px; border-radius: 7px;
        border: 1px solid var(--border2); background: #0b1220;
        color: var(--text); padding: 9px 11px;
        resize: vertical; font-family: var(--font-sans); font-size: 14px;
      }
      textarea:focus { outline: none; border-color: var(--accent2); }
      button, select {
        font-family: var(--font-sans);
        border: 1px solid var(--border); background: var(--surface2);
        color: var(--text); border-radius: 7px; padding: 7px 12px; cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #1e2e42; }
      #newSessionBtn { color: var(--text-dim); font-size: 12px; padding: 5px 8px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .status { font-size: 12px; color: var(--accent); }
      .hint { font-size: 12px; color: var(--text-muted); }
      .label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }

      /* ── Sample Prompts panel ───────────────────────────────────── */
      #promptsOverlay {
        display: none; position: fixed; inset: 0; z-index: 200;
        background: rgba(0,0,0,0.5);
      }
      #promptsPanel {
        position: absolute; right: 0; top: 0; bottom: 0; width: 520px;
        max-width: 96vw;
        background: var(--surface); border-left: 1px solid var(--border);
        display: flex; flex-direction: column; overflow: hidden;
        box-shadow: -8px 0 32px rgba(0,0,0,0.5);
      }
      #promptsPanel .ph { color: #e0883a; font-weight: 400; font-style: italic; }
      .p-card {
        background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px;
        padding: 10px 12px; cursor: pointer; transition: border-color 0.1s;
      }
      .p-card:hover { border-color: #3a5070; background: #1e2d42; }
      .p-title { font-size: 13px; font-weight: 500; color: #c0cfde; }
      .p-text { font-size: 12px; color: var(--text-dim); line-height: 1.55; margin-top: 4px; }
      .p-tab {
        flex-shrink: 0; font-size: 11px; padding: 4px 10px; border-radius: 5px;
        white-space: nowrap; border: 1px solid var(--border2); background: var(--surface2);
        color: var(--text-dim); cursor: pointer; font-family: var(--font-sans);
      }
      .p-tab:hover { background: #1e2e42; }
      .p-tab.active { background: #152a4a; color: #6aaaf0; border-color: #1e3a6a; }
      .mb-chat    { background:#152a4a; color:#6aaaf0; }
      .mb-deep    { background:#25185a; color:#9b7fe8; }
      .mb-impact  { background:#3a1800; color:#e89440; }
      .mb-generate{ background:#0f2a18; color:#4abf70; }
      .mode-badge {
        display: inline-block; font-size: 10px; font-weight: 500;
        padding: 1px 7px; border-radius: 3px; text-transform: uppercase;
        letter-spacing: 0.04em; flex-shrink: 0;
      }
      #promptsBtn { font-size: 12px; padding: 5px 10px; color: var(--text-dim); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Local AI Agent Chat</h1>
      <div class="sub">Simple browser chat for your local API (no VS Code extension required).</div>
      <div class="panel">
        <div class="toolbar">
          <label for="mode">Mode:</label>
          <select id="mode">
            <option value="chat">chat</option>
            <option value="deep">deep</option>
            <option value="generate">generate</option>
            <option value="impact">impact</option>
          </select>
          <button id="promptsBtn" type="button">📋 Prompts</button>
          <button id="healthBtn" type="button">Health</button>
          <button id="newSessionBtn" type="button">New Session</button>
          <span id="sessionBadge" class="hint" style="font-size:11px;color:#475569;cursor:default;" title=""></span>
          <span id="status" class="status"></span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="controls">
          <textarea id="input" placeholder="Ask about your codebase..."></textarea>
          <div class="row">
            <button id="sendBtn" type="button">Send</button>
            <button id="reindexBtn" type="button">Reindex</button>
            <span class="hint">Streaming uses `/ask/stream`; fallback uses `/ask`.</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Sample Prompts overlay ───────────────────────────────────── -->
    <div id="promptsOverlay">
      <div id="promptsPanel">
        <div style="padding:12px 16px; border-bottom:1px solid #334155; display:flex; align-items:center; gap:10px; flex-shrink:0;">
          <span style="font-size:15px; font-weight:500; color:#b8c8de;">Sample Prompts</span>
          <span style="font-size:11px; color:#4e6179; flex:1;">Click any prompt → fills input. Replace <span style="color:#e0883a; font-style:italic;">[bracketed]</span> placeholders before sending.</span>
          <button id="closePromptsBtn" style="background:none; border:none; color:#64748b; font-size:22px; cursor:pointer; line-height:1; padding:0 2px;" title="Close">×</button>
        </div>
        <div id="promptTabs" style="display:flex; gap:5px; padding:8px 12px; border-bottom:1px solid #334155; overflow-x:auto; flex-shrink:0; scrollbar-width:thin;"></div>
        <div id="promptsList" style="overflow-y:auto; padding:12px; flex:1; display:flex; flex-direction:column; gap:8px;"></div>
      </div>
    </div>

    <script>
      const messages = document.getElementById("messages");
      const input = document.getElementById("input");
      const mode = document.getElementById("mode");
      const statusEl = document.getElementById("status");

      // Session persistence across page reloads
      let sessionId = localStorage.getItem("chat_session_id") || null;

      marked.setOptions({
        highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true,
      });

      function renderMarkdown(text) {
        return marked.parse(text);
      }

      function addMsg(kind, text) {
        const div = document.createElement("div");
        div.className = `msg ${kind}`;
        if (kind === "ai") {
          div.innerHTML = renderMarkdown(text || "");
          if (text) attachCopyResponseBtn(div, text);
        } else {
          div.textContent = text;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      function attachCopyResponseBtn(div, rawText) {
        let btn = div.querySelector(".copy-response-btn");
        if (!btn) {
          btn = document.createElement("button");
          btn.className = "copy-response-btn";
          btn.title = "Copy full response";
          btn.textContent = "Copy response";
          div.appendChild(btn);
        }
        // Always refresh the stored text so mid-stream copies get the latest content
        btn.onclick = () => {
          navigator.clipboard.writeText(rawText).then(() => {
            btn.textContent = "✓ Copied";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = "Copy response";
              btn.classList.remove("copied");
            }, 1800);
          }).catch(() => {});
        };
      }

      function escHtml(str) {
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      function postProcessCodeBlocks(div) {
        div.querySelectorAll("pre").forEach(pre => {
          if (pre.closest(".code-block-wrap")) return;  // already processed
          const code = pre.querySelector("code");
          if (!code) return;

          const isDiff = code.className.includes("language-diff");
          const rawText = code.textContent;

          // Wrap pre in a container
          const wrap = document.createElement("div");
          wrap.className = "code-block-wrap";
          pre.parentNode.insertBefore(wrap, pre);
          wrap.appendChild(pre);

          // Build toolbar
          const toolbar = document.createElement("div");
          toolbar.className = "code-toolbar";

          if (isDiff) {
            const pathMatch = rawText.match(/^\+\+\+\s+(?:b\/)?(.+)/m);
            const filePath = pathMatch ? pathMatch[1].trim() : null;
            if (filePath) {
              const pathSpan = document.createElement("span");
              pathSpan.className = "code-file-path";
              pathSpan.textContent = filePath;
              toolbar.appendChild(pathSpan);

              const applyBtn = document.createElement("button");
              applyBtn.className = "code-action-btn apply-btn";
              applyBtn.textContent = "Apply";
              applyBtn.addEventListener("click", () => applyDiff(applyBtn, rawText));
              toolbar.appendChild(applyBtn);
            }
          }

          const copyBtn = document.createElement("button");
          copyBtn.className = "code-action-btn copy-btn";
          copyBtn.textContent = "Copy";
          copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(rawText).then(() => {
              copyBtn.textContent = "Copied!";
              setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
            }).catch(() => {
              copyBtn.textContent = "Copy";
            });
          });
          toolbar.appendChild(copyBtn);

          wrap.insertBefore(toolbar, pre);
        });
      }

      async function applyDiff(btn, diffText) {
        btn.textContent = "Applying…";
        btn.disabled = true;
        try {
          const res = await fetch("/apply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ diff: diffText }),
          });
          const data = await res.json();
          if (data.status === "ok") {
            btn.textContent = "✓ Applied";
            btn.classList.add("applied");
            const files = [...(data.files_modified||[]), ...(data.files_created||[])];
            if (files.length) statusEl.textContent = `Applied to: ${files.join(", ")}`;
          } else {
            btn.textContent = "✗ Failed";
            btn.classList.add("failed");
            btn.disabled = false;
            statusEl.textContent = `Apply error: ${data.error || "unknown"}`;
            console.error("Apply error:", data.error);
          }
        } catch (e) {
          btn.textContent = "Apply";
          btn.disabled = false;
          statusEl.textContent = `Network error: ${e.message}`;
        }
      }

      function updateAiMsg(div, fullText) {
        // Preserve plan strip if present
        const strip = div.querySelector(".plan-strip");
        div.innerHTML = renderMarkdown(fullText);
        if (strip) div.prepend(strip);
        attachCopyResponseBtn(div, fullText);
        postProcessCodeBlocks(div);
        messages.scrollTop = messages.scrollHeight;
      }

      function parseSSEBlock(block) {
        // Parse a single SSE block (split by \n\n) into {type, data}
        let evType = "message";
        let evData = "";
        for (const line of block.split("\n")) {
          if (line.startsWith("event: ")) evType = line.slice(7).trim();
          else if (line.startsWith("data: ")) evData = line.slice(6);
        }
        return { type: evType, data: evData };
      }

      function showPlanStrip(aiDiv, planData) {
        // Render the planning strip above the answer text
        let strip = aiDiv.querySelector(".plan-strip");
        if (!strip) {
          strip = document.createElement("div");
          strip.className = "plan-strip";
          aiDiv.prepend(strip);
        }
        const tools = (planData.tools || [])
          .map(t => `<span class="tool-tag">${t}</span>`).join(" ");
        const reasoning = planData.reasoning || "";
        strip.innerHTML = `<span style="color:#4e6179">Gathered via:</span> ${tools}${reasoning ? ` <span style="color:#3a5070">— ${reasoning}</span>` : ""}`;
      }

      async function askStream(question, selectedMode) {
        const res = await fetch("/ask/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, mode: selectedMode, session_id: sessionId }),
        });
        if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);

        const ai = addMsg("ai", "");
        // Show a "planning…" placeholder immediately
        ai.innerHTML = '<span class="thinking">Planning…</span>';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let fullText = "";
        let planReceived = false;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split("\n\n");
          buffer = blocks.pop() || "";
          for (const block of blocks) {
            if (!block.trim()) continue;
            const { type, data } = parseSSEBlock(block);
            if (type === "session") {
              sessionId = data;
              localStorage.setItem("chat_session_id", sessionId);
              updateSessionBadge();
            } else if (type === "progress") {
              try {
                const prog = JSON.parse(data);
                if (prog.stage === "planning") {
                  statusEl.textContent = "thinking — planning tool calls…";
                } else if (prog.stage === "tool") {
                  statusEl.textContent = `running: ${prog.tool} (${prog.n} of ${prog.total})…`;
                } else if (prog.stage === "synthesizing") {
                  statusEl.textContent = "synthesizing answer…";
                }
              } catch (_) { /* ignore */ }
            } else if (type === "plan") {
              planReceived = true;
              try {
                const planData = JSON.parse(data);
                // Clear placeholder, show plan strip
                ai.innerHTML = "";
                showPlanStrip(ai, planData);
                statusEl.textContent = `gathering context (${(planData.tools || []).length} tools)…`;
              } catch (_) { /* ignore parse errors */ }
            } else if (type === "done") {
              // stream finished
            } else if (data) {
              if (!planReceived) {
                // Fallback path (no plan event) — clear placeholder on first token
                ai.innerHTML = "";
                planReceived = true;
              }
              fullText += data;
              updateAiMsg(ai, fullText);
            }
          }
        }
        if (fullText) updateAiMsg(ai, fullText);
      }

      async function askFallback(question, selectedMode) {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, mode: selectedMode, session_id: sessionId }),
        });
        const data = await res.json();
        if (data.session_id) {
          sessionId = data.session_id;
          localStorage.setItem("chat_session_id", sessionId);
          updateSessionBadge();
        }
        addMsg("ai", data.answer || JSON.stringify(data));
      }

      function updateSessionBadge() {
        const badge = document.getElementById("sessionBadge");
        if (badge && sessionId) {
          badge.textContent = `session: ${sessionId.slice(0, 8)}…`;
          badge.title = sessionId;
        }
      }

      document.getElementById("sendBtn").addEventListener("click", async () => {
        const q = input.value.trim();
        if (!q) return;
        addMsg("user", q);
        input.value = "";
        statusEl.textContent = "thinking…";
        try {
          await askStream(q, mode.value);
          statusEl.textContent = "done";
        } catch (e) {
          statusEl.textContent = "stream failed, using fallback";
          try {
            await askFallback(q, mode.value);
            statusEl.textContent = "done";
          } catch (err) {
            statusEl.textContent = `error: ${err.message || err}`;
          }
        }
      });

      // Send on Ctrl+Enter
      input.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          document.getElementById("sendBtn").click();
        }
      });

      document.getElementById("healthBtn").addEventListener("click", async () => {
        const res = await fetch("/health");
        const data = await res.json();
        statusEl.textContent = `health=${data.status} ollama=${data.ollama} chroma=${data.chromadb} model=${data.model}`;
      });

      document.getElementById("reindexBtn").addEventListener("click", async () => {
        statusEl.textContent = "reindexing…";
        const res = await fetch("/reindex", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        const data = await res.json();

      function hp(text) {
        // Highlight [PLACEHOLDER] tokens in amber
        return text.replace(/\[([^\]]+)\]/g,
          '<span class="ph">[$1]</span>');
      }

      function buildPromptsPanel() {
        const tabs = document.getElementById('promptTabs');
        const list = document.getElementById('promptsList');
        let activeIdx = 0;

        function showCategory(idx) {
          activeIdx = idx;
          tabs.querySelectorAll('.p-tab').forEach((t, i) =>
            t.classList.toggle('active', i === idx));
          renderPrompts(PROMPT_CATEGORIES[idx].prompts);
        }

        PROMPT_CATEGORIES.forEach((cat, i) => {
          const tab = document.createElement('button');
          tab.className = 'p-tab' + (i === 0 ? ' active' : '');
          tab.textContent = `${cat.icon} ${cat.name}`;
          tab.addEventListener('click', () => showCategory(i));
          tabs.appendChild(tab);
        });

        showCategory(0);
      }

      function renderPrompts(prompts) {
        const list = document.getElementById('promptsList');
        list.innerHTML = '';
        prompts.forEach(p => {
          const card = document.createElement('div');
          card.className = 'p-card';
          card.innerHTML =
            `<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">` +
            `<span class="mode-badge mb-${p.mode}">${p.mode}</span>` +
            `<span class="p-title">${p.title}</span></div>` +
            `<div class="p-text">${hp(p.text)}</div>`;
          card.addEventListener('click', () => usePrompt(p));
          list.appendChild(card);
        });
      }

      function usePrompt(p) {
        document.getElementById('mode').value = p.mode;
        const ta = document.getElementById('input');
        ta.value = p.text;
        document.getElementById('promptsOverlay').style.display = 'none';
        ta.focus();
        const first = p.text.indexOf('[');
        const last  = p.text.indexOf(']', first);
        if (first >= 0 && last >= 0) ta.setSelectionRange(first, last + 1);
      }

      document.getElementById('promptsBtn').addEventListener('click', () => {
        document.getElementById('promptsOverlay').style.display = 'block';
      });
      document.getElementById('closePromptsBtn').addEventListener('click', () => {
        document.getElementById('promptsOverlay').style.display = 'none';
      });
      document.getElementById('promptsOverlay').addEventListener('click', e => {
        if (e.target.id === 'promptsOverlay')
          document.getElementById('promptsOverlay').style.display = 'none';
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape')
          document.getElementById('promptsOverlay').style.display = 'none';
      });

      buildPromptsPanel();
