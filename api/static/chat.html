<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local AI Agent Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: #94a3b8; margin-bottom: 16px; }
      .panel { border: 1px solid #334155; border-radius: 10px; background: #111827; }
      .toolbar { padding: 10px; border-bottom: 1px solid #334155; display: flex; gap: 8px; align-items: center; }
      .messages { height: 60vh; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .msg { padding: 12px 16px; border-radius: 10px; line-height: 1.6; font-size: 14px; max-width: 100%; word-break: break-word; }
      .user { background: #1d4ed8; align-self: flex-end; max-width: 80%; white-space: pre-wrap; }
      .ai {
        background: #1e293b;
        border: 1px solid #334155;
        align-self: flex-start;
        width: 100%;
        color: #e2e8f0;
      }
      .plan-strip {
        font-size: 11px; color: #64748b; margin-bottom: 8px;
        padding: 4px 8px; background: #0f172a; border-radius: 4px;
        border-left: 2px solid #334155;
      }
      .plan-strip strong { color: #475569; }
      .plan-strip .tool-tag {
        display: inline-block; background: #1e293b; border: 1px solid #334155;
        border-radius: 3px; padding: 0 4px; margin: 1px 2px; color: #60a5fa;
      }
      .thinking { color: #475569; font-style: italic; font-size: 13px; }
      /* markdown content inside AI messages */
      .ai p { margin: 0 0 10px; }
      .ai p:last-child { margin-bottom: 0; }
      .ai h1,.ai h2,.ai h3,.ai h4 { margin: 14px 0 6px; color: #f1f5f9; font-weight: 600; }
      .ai h1 { font-size: 18px; } .ai h2 { font-size: 16px; } .ai h3 { font-size: 14px; }
      .ai ul, .ai ol { margin: 6px 0 10px 20px; padding: 0; }
      .ai li { margin: 4px 0; }
      .ai code {
        font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
        font-size: 13px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 4px;
        padding: 1px 5px;
        color: #93c5fd;
      }
      .ai pre {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 0 0 8px 8px;
        padding: 14px;
        overflow-x: auto;
        margin: 0;
      }
      .ai pre code {
        background: none;
        border: none;
        padding: 0;
        color: inherit;
        font-size: 13px;
      }
      /* Code block container wraps toolbar + pre */
      .code-block-wrap {
        border: 1px solid #30363d;
        border-radius: 8px;
        overflow: hidden;
        margin: 10px 0;
      }
      .code-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        min-height: 30px;
      }
      .code-file-path {
        flex: 1;
        font-size: 11px;
        color: #60a5fa;
        font-family: 'Fira Code', Consolas, monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .code-action-btn {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #cbd5e1;
        cursor: pointer;
        flex-shrink: 0;
      }
      .code-action-btn:hover { background: #293548; }
      .code-action-btn.apply-btn { border-color: #1e40af; color: #93c5fd; }
      .code-action-btn.apply-btn:hover { background: #1e3a5f; }
      .code-action-btn.applied { color: #4ade80; border-color: #166534; }
      .code-action-btn.failed  { color: #f87171; border-color: #7f1d1d; }
      .ai blockquote {
        border-left: 3px solid #475569;
        margin: 8px 0;
        padding: 4px 12px;
        color: #94a3b8;
      }
      .ai table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
      .ai th, .ai td { border: 1px solid #334155; padding: 6px 10px; text-align: left; }
      .ai th { background: #1e293b; color: #cbd5e1; }
      .ai tr:nth-child(even) td { background: #162032; }
      .ai strong { color: #f1f5f9; }
      .ai em { color: #cbd5e1; }
      .ai a { color: #60a5fa; }
      .ai hr { border: none; border-top: 1px solid #334155; margin: 12px 0; }
      .controls { padding: 10px; border-top: 1px solid #334155; display: grid; gap: 8px; }
      textarea { width: 100%; min-height: 100px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px; box-sizing: border-box; resize: vertical; }
      button, select { border: 1px solid #334155; background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
      button:hover { background: #293548; }
      #newSessionBtn { color: #94a3b8; font-size: 12px; padding: 6px 8px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .status { font-size: 12px; color: #93c5fd; }
      .hint { font-size: 12px; color: #94a3b8; }
      .label { font-size: 11px; color: #64748b; margin-bottom: 3px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Local AI Agent Chat</h1>
      <div class="sub">Simple browser chat for your local API (no VS Code extension required).</div>
      <div class="panel">
        <div class="toolbar">
          <label for="mode">Mode:</label>
          <select id="mode">
            <option value="chat">chat</option>
            <option value="deep">deep</option>
            <option value="generate">generate</option>
            <option value="impact">impact</option>
          </select>
          <button id="healthBtn" type="button">Health</button>
          <button id="newSessionBtn" type="button">New Session</button>
          <span id="sessionBadge" class="hint" style="font-size:11px;color:#475569;cursor:default;" title=""></span>
          <span id="status" class="status"></span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="controls">
          <textarea id="input" placeholder="Ask about your codebase..."></textarea>
          <div class="row">
            <button id="sendBtn" type="button">Send</button>
            <button id="reindexBtn" type="button">Reindex</button>
            <span class="hint">Streaming uses `/ask/stream`; fallback uses `/ask`.</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      const messages = document.getElementById("messages");
      const input = document.getElementById("input");
      const mode = document.getElementById("mode");
      const statusEl = document.getElementById("status");

      // Session persistence across page reloads
      let sessionId = localStorage.getItem("chat_session_id") || null;

      marked.setOptions({
        highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true,
      });

      function renderMarkdown(text) {
        return marked.parse(text);
      }

      function addMsg(kind, text) {
        const div = document.createElement("div");
        div.className = `msg ${kind}`;
        if (kind === "ai") {
          div.innerHTML = renderMarkdown(text || "");
        } else {
          div.textContent = text;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      function escHtml(str) {
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      function postProcessCodeBlocks(div) {
        div.querySelectorAll("pre").forEach(pre => {
          if (pre.closest(".code-block-wrap")) return;  // already processed
          const code = pre.querySelector("code");
          if (!code) return;

          const isDiff = code.className.includes("language-diff");
          const rawText = code.textContent;

          // Wrap pre in a container
          const wrap = document.createElement("div");
          wrap.className = "code-block-wrap";
          pre.parentNode.insertBefore(wrap, pre);
          wrap.appendChild(pre);

          // Build toolbar
          const toolbar = document.createElement("div");
          toolbar.className = "code-toolbar";

          if (isDiff) {
            const pathMatch = rawText.match(/^\+\+\+\s+(?:b\/)?(.+)/m);
            const filePath = pathMatch ? pathMatch[1].trim() : null;
            if (filePath) {
              const pathSpan = document.createElement("span");
              pathSpan.className = "code-file-path";
              pathSpan.textContent = filePath;
              toolbar.appendChild(pathSpan);

              const applyBtn = document.createElement("button");
              applyBtn.className = "code-action-btn apply-btn";
              applyBtn.textContent = "Apply";
              applyBtn.addEventListener("click", () => applyDiff(applyBtn, rawText));
              toolbar.appendChild(applyBtn);
            }
          }

          const copyBtn = document.createElement("button");
          copyBtn.className = "code-action-btn copy-btn";
          copyBtn.textContent = "Copy";
          copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(rawText).then(() => {
              copyBtn.textContent = "Copied!";
              setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
            }).catch(() => {
              copyBtn.textContent = "Copy";
            });
          });
          toolbar.appendChild(copyBtn);

          wrap.insertBefore(toolbar, pre);
        });
      }

      async function applyDiff(btn, diffText) {
        btn.textContent = "Applying…";
        btn.disabled = true;
        try {
          const res = await fetch("/apply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ diff: diffText }),
          });
          const data = await res.json();
          if (data.status === "ok") {
            btn.textContent = "✓ Applied";
            btn.classList.add("applied");
            const files = [...(data.files_modified||[]), ...(data.files_created||[])];
            if (files.length) statusEl.textContent = `Applied to: ${files.join(", ")}`;
          } else {
            btn.textContent = "✗ Failed";
            btn.classList.add("failed");
            btn.disabled = false;
            statusEl.textContent = `Apply error: ${data.error || "unknown"}`;
            console.error("Apply error:", data.error);
          }
        } catch (e) {
          btn.textContent = "Apply";
          btn.disabled = false;
          statusEl.textContent = `Network error: ${e.message}`;
        }
      }

      function updateAiMsg(div, fullText) {
        // Preserve plan strip if present
        const strip = div.querySelector(".plan-strip");
        div.innerHTML = renderMarkdown(fullText);
        if (strip) div.prepend(strip);
        postProcessCodeBlocks(div);
        messages.scrollTop = messages.scrollHeight;
      }

      function parseSSEBlock(block) {
        // Parse a single SSE block (split by \n\n) into {type, data}
        let evType = "message";
        let evData = "";
        for (const line of block.split("\n")) {
          if (line.startsWith("event: ")) evType = line.slice(7).trim();
          else if (line.startsWith("data: ")) evData = line.slice(6);
        }
        return { type: evType, data: evData };
      }

      function showPlanStrip(aiDiv, planData) {
        // Render the planning strip above the answer text
        let strip = aiDiv.querySelector(".plan-strip");
        if (!strip) {
          strip = document.createElement("div");
          strip.className = "plan-strip";
          aiDiv.prepend(strip);
        }
        const tools = (planData.tools || [])
          .map(t => `<span class="tool-tag">${t}</span>`).join(" ");
        const reasoning = planData.reasoning || "";
        strip.innerHTML = `<strong>Gathered via:</strong> ${tools}${reasoning ? ` — ${reasoning}` : ""}`;
      }

      async function askStream(question, selectedMode) {
        const res = await fetch("/ask/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, mode: selectedMode, session_id: sessionId }),
        });
        if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);

        const ai = addMsg("ai", "");
        // Show a "planning…" placeholder immediately
        ai.innerHTML = '<span class="thinking">Planning…</span>';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let fullText = "";
        let planReceived = false;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split("\n\n");
          buffer = blocks.pop() || "";
          for (const block of blocks) {
            if (!block.trim()) continue;
            const { type, data } = parseSSEBlock(block);
            if (type === "session") {
              sessionId = data;
              localStorage.setItem("chat_session_id", sessionId);
              updateSessionBadge();
            } else if (type === "plan") {
              planReceived = true;
              try {
                const planData = JSON.parse(data);
                // Clear placeholder, show plan strip
                ai.innerHTML = "";
                showPlanStrip(ai, planData);
                statusEl.textContent = `gathering context (${(planData.tools || []).length} tools)…`;
              } catch (_) { /* ignore parse errors */ }
            } else if (type === "done") {
              // stream finished
            } else if (data) {
              if (!planReceived) {
                // Fallback path (no plan event) — clear placeholder on first token
                ai.innerHTML = "";
                planReceived = true;
              }
              fullText += data;
              updateAiMsg(ai, fullText);
            }
          }
        }
        if (fullText) updateAiMsg(ai, fullText);
      }

      async function askFallback(question, selectedMode) {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, mode: selectedMode, session_id: sessionId }),
        });
        const data = await res.json();
        if (data.session_id) {
          sessionId = data.session_id;
          localStorage.setItem("chat_session_id", sessionId);
          updateSessionBadge();
        }
        addMsg("ai", data.answer || JSON.stringify(data));
      }

      function updateSessionBadge() {
        const badge = document.getElementById("sessionBadge");
        if (badge && sessionId) {
          badge.textContent = `session: ${sessionId.slice(0, 8)}…`;
          badge.title = sessionId;
        }
      }

      document.getElementById("sendBtn").addEventListener("click", async () => {
        const q = input.value.trim();
        if (!q) return;
        addMsg("user", q);
        input.value = "";
        statusEl.textContent = "thinking…";
        try {
          await askStream(q, mode.value);
          statusEl.textContent = "done";
        } catch (e) {
          statusEl.textContent = "stream failed, using fallback";
          try {
            await askFallback(q, mode.value);
            statusEl.textContent = "done";
          } catch (err) {
            statusEl.textContent = `error: ${err.message || err}`;
          }
        }
      });

      // Send on Ctrl+Enter
      input.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          document.getElementById("sendBtn").click();
        }
      });

      document.getElementById("healthBtn").addEventListener("click", async () => {
        const res = await fetch("/health");
        const data = await res.json();
        statusEl.textContent = `health=${data.status} ollama=${data.ollama} chroma=${data.chromadb} model=${data.model}`;
      });

      document.getElementById("reindexBtn").addEventListener("click", async () => {
        statusEl.textContent = "reindexing…";
        const res = await fetch("/reindex", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        const data = await res.json();
        statusEl.textContent = `reindexed ${data.projects_indexed?.length || 0} project(s), chunks=${data.chunks_created}`;
      });

      document.getElementById("newSessionBtn").addEventListener("click", () => {
        sessionId = null;
        localStorage.removeItem("chat_session_id");
        updateSessionBadge();
        messages.innerHTML = "";
        statusEl.textContent = "new session started";
      });

      // Init session badge
      updateSessionBadge();
    </script>
  </body>
</html>
